paths:
  raw_dir: data/raw
  processed_dir: data/processed
  outputs_dir: outputs
  checkpoints_dir: outputs/checkpoints
  reports_dir: outputs/reports
  label_candidates: data/label_candidates.csv
  selected_labels: data/selected_labels.json
  selected_labels_small: data/selected_labels_small.json
  subset_manifest: data/mediapipe_video_manifest.csv
  processed_npz: data/processed/sign_word_mediapipe_subset.npz

data:
  morpheme_globs:
    - data/raw/**/real_word_morpheme/**/*.json
    - data/raw/**/*morpheme*.json
  keypoint_globs:
    - data/raw/**/real_word_keypoint/**/*.json
    - data/raw/**/*keypoint*.json
  quick_test: true
  max_classes: 8
  max_samples_per_class: 30
  sequence_length: 32
  min_samples_per_class: 1
  validation_ratio: 0.2
  random_seed: 42

preprocess:
  normalize: true
  fill_missing: zero
  feature_dims: 3

train:
  baseline_model: random_forest
  epochs: 80
  batch_size: 64
  learning_rate: 0.001
  hidden_size: 64
  num_layers: 1
  dropout: 0.3
  rnn_type: gru
  model_type: cnn_gru
  conv_channels: 64
  num_heads: 4

realtime:
  window_size: 32
  confidence_threshold: 0.35
  cooldown_seconds: 1.0

services:
  tts_backend: local
  stt_backend: local

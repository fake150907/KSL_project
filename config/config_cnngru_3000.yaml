# ============================================================
# CNN-GRU 모델 설정 파일
# 프로젝트: 양방향 수어 통역 보조 시스템 (의료 도메인)
# 작성일: 2026-05-10
# ============================================================

# ── 모델 정보 ──────────────────────────────────────────────
model:
  name: CNN-GRU
  baseline: 1D-CNN                  # 기존 베이스라인 모델
  val_acc: 95.68%                   # 최종 정확도
  best_epoch: 297
  total_epochs: 300
  total_params: 339576              # 약 34만개

# ── 데이터 설정 ────────────────────────────────────────────
data:
  npz_path: "C:/python_study/project_2team/data/processed/mediapipe_npz_FILE01_FILE12_ALL.npz"
  total_samples: 89958
  num_classes: 3000                 # WORD0001 ~ WORD3000
  val_ratio: 0.2
  train_samples: 71966
  val_samples: 17992
  random_seed: 42
  label_map: "WORD_3000_CLASS_UPDATE_20260506/label_map_word_id_3000.json"
  idx_to_label: "WORD_3000_CLASS_UPDATE_20260506/idx_to_label_3000.json"
  excluded_files: "FILE13~16 (에러로 제외)"

# ── 입력 특징 설정 ─────────────────────────────────────────
feature:
  layout: mediapipe_xyz
  sequence_length: 32
  feature_dim: 225                  # pose33 + left_hand21 + right_hand21 = 75점 × xyz
  normalize: shoulder               # shoulder-center + shoulder-width scale
  x_shape: "(N, 32, 225)"

# ── 학습 하이퍼파라미터 ────────────────────────────────────
train:
  batch_size: 32
  epochs: 300
  learning_rate: 0.0003             # 3e-4
  optimizer: Adam
  loss: CrossEntropyLoss
  label_smoothing: 0.1
  scheduler: ReduceLROnPlateau
  scheduler_patience: 10
  scheduler_factor: 0.5

# ── CNN 설정 ───────────────────────────────────────────────
cnn:
  type: Conv1d                      # Conv2d → Conv1d 로 수정 (gru_input_size 14400 → 64)
  in_channels: 225                  # feature_dim
  out_channels: 64
  kernel_size: 3
  padding: 1
  dropout: 0.2

# ── GRU 설정 ───────────────────────────────────────────────
gru:
  input_size: 64                    # CNN out_channels
  hidden_size: 128
  num_layers: 2
  bidirectional: true               # 양방향 → output: 256
  dropout: 0.3

# ── FC (분류기) 설정 ───────────────────────────────────────
classifier:
  fc1_in: 256                       # hidden_size * 2 (양방향)
  fc1_out: 128
  dropout: 0.3
  fc2_out: 3000                     # num_classes

# ── 출력 파일 경로 ─────────────────────────────────────────
output:
  checkpoint: "C:/python_study/KSL_project_minseok/outputs/checkpoints/best_cnngru_3000.pt"
  report: "C:/python_study/KSL_project_minseok/outputs/training_report_cnngru_3000.md"
  loss_curve: "C:/python_study/KSL_project_minseok/outputs/loss_accuracy_curve_cnngru.png"
  confusion_matrix: "C:/python_study/KSL_project_minseok/outputs/confusion_matrix_cnngru.png"
  confusion_matrix_medical: "C:/python_study/KSL_project_minseok/outputs/confusion_matrix_medical.png"

# ── 환경 ───────────────────────────────────────────────────
environment:
  python: "3.10.x"
  pytorch: "2.11.0+cu128"
  mediapipe: "0.10.13"
  opencv: "4.11.0"
  numpy: "1.26.4"
  scikit_learn: "1.3.1"
  device: "cuda (RTX 3060 Ti)"
  conda_env: myenv310

# ── 비교 결과 ──────────────────────────────────────────────
comparison:
  - model: 1D-CNN
    epochs: 80
    val_acc: 32.66%
    params: 255032
  - model: CNN-GRU (수정전 Conv2d)
    epochs: 17
    val_acc: 0.09%
    params: 11875768
    note: "Conv2d 구조 오류로 수렴 실패"
  - model: CNN-GRU (수정후 Conv1d)
    epochs: 300
    val_acc: 95.68%
    params: 339576
    note: "최종 채택 모델"

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  outputs_dir: outputs
  checkpoints_dir: outputs/checkpoints
  reports_dir: outputs/reports
  label_candidates: data/label_candidates.csv
  selected_labels: data/selected_labels.json
  selected_labels_small: data/selected_labels_small.json
  subset_manifest: data/sample_subset_manifest.csv
  processed_npz: data/processed/sign_word_subset.npz

data:
  quick_test: true
  max_classes: 8
  max_samples_per_class: 30
  sequence_length: 32
  min_samples_per_class: 1
  validation_ratio: 0.2
  random_seed: 42

preprocess:
  normalize: true
  fill_missing: zero
  feature_dims: 3
  landmark_layout: mediapipe_xyz
  feature_count: 225
  normalization: shoulder-center + shoulder-width scale

train:
  epochs: 80
  batch_size: 64
  learning_rate: 0.001
  hidden_size: 64
  num_layers: 1
  dropout: 0.3
  rnn_type: gru
  model_type: cnn_gru
  conv_channels: 64
  num_heads: 4

realtime:
  model_type: sequence
  landmark_layout: mediapipe_xyz
  window_size: 32
  capture_interval_ms: 100
  confidence_threshold: 0.35
  stable_min_count: 2
  max_missing_frames: 3
  cooldown_seconds: 1.0

services:
  tts_backend: local
  stt_backend: local

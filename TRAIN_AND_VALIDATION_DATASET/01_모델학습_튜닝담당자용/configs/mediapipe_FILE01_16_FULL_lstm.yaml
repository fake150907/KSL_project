paths:
  raw_dir: data/raw
  processed_dir: data/processed
  outputs_dir: outputs
  checkpoints_dir: outputs/checkpoints_FILE01_16_FULL_lstm
  reports_dir: outputs/reports_FILE01_16_FULL_lstm
  label_candidates: data/label_candidates.csv
  selected_labels: data/selected_labels.json
  selected_labels_small: data/selected_labels_small.json
  subset_manifest: team_handover_outputs/FILE01_16_FULL/shard_manifest_FILE01_16_FULL.csv
  processed_npz: data/processed/mediapipe_train_dataset_FILE01_16_FULL.npz

data:
  quick_test: true
  max_classes: 8
  max_samples_per_class: 128
  sequence_length: 32
  min_samples_per_class: 1
  validation_ratio: 0.2
  random_seed: 7

preprocess:
  normalize: true
  normalize_mode: mediapipe_xyz_body
  fill_missing: zero
  feature_dims: 3
  landmark_layout: mediapipe_xyz

train:
  baseline_model: random_forest
  epochs: 50
  batch_size: 16
  learning_rate: 0.001
  hidden_size: 64
  num_layers: 1
  dropout: 0.3
  rnn_type: lstm
  model_type: rnn
  conv_channels: 64
  num_heads: 4

realtime:
  window_size: 32
  confidence_threshold: 0.35
  cooldown_seconds: 1.0

services:
  tts_backend: local
  stt_backend: local
